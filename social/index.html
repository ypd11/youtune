<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Feed</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="social-container">
    <div class="social-page-header">
        <div>
            <h1>Social</h1>
            <p>Connect with listeners worldwide 🌍</p>
        </div>
        <button class="header-btn" onclick="goToChat()" title="Go to Global Chat">
            <span class="material-icons">chat</span>
        </button>
    </div>

    <!-- Create Post -->
    <div class="create-post-card">
        <div class="cp-header">
            <span class="material-icons">edit</span> Create Post
        </div>
        <textarea id="post-input" placeholder="What's on your mind?"></textarea>
        <div class="cp-actions">
            <button class="icon-btn emoji-toggle-btn" onclick="toggleEmojiPicker()" title="Add Emoji">
                <span class="material-icons">sentiment_satisfied_alt</span>
            </button>
            <div id="emoji-picker" class="emoji-picker hidden"></div>
            <button class="post-btn" onclick="createPost()">Post</button>
        </div>
    </div>

    <!-- Feed -->
    <div id="feed-container" class="feed-container">
        <!-- Posts go here -->
    </div>

    <!-- Pagination -->
    <div class="pagination-container">
        <button id="load-more-btn" class="load-more-btn" onclick="loadMorePosts()">Load More</button>
    </div>

    <button id="scroll-top-btn" class="scroll-top-btn" onclick="scrollToTop()" title="Back to Top">
        <span class="material-icons">arrow_upward</span>
    </button>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closeDeleteModal()"></div>
        <div class="modal-content">
            <h3 class="modal-title">Delete Content?</h3>
            <p class="modal-text">Are you sure you want to delete this? This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeDeleteModal()">Cancel</button>
                <button class="modal-btn delete" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="script.js"></script>
</body>
</html>
