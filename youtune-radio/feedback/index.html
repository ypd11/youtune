<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback & Issues</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="../icon-192.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="feedback-header">
    <div class="logo-area">
        <img src="../icon-512.png" alt="YouTune" class="logo-icon-img">
        <h1>Feedback</h1>
    </div>
    <p>Report bugs, share your opinion or suggest features to improve our site 🚀</p>
    <button class="admin-login-btn" onclick="openAdminModal()" title="Admin Login">
        <span class="material-icons">lock</span>
    </button>
</header>

<div class="feedback-container">
    <!-- Create Post -->
    <div class="create-card">
        <div class="input-group">
            <textarea id="post-input" placeholder="Describe the issue or idea..."></textarea>
        </div>
        <div class="action-row">
            <div class="tag-selector">
                <label class="radio-label">
                    <input type="radio" name="tag" value="bug" checked>
                    <span class="tag-badge bug">Bug</span>
                </label>
                <label class="radio-label">
                    <input type="radio" name="tag" value="feature">
                    <span class="tag-badge feature">Feedback</span>
                </label>
            </div>
            <button class="submit-btn" onclick="createPost()">Submit</button>
        </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterPosts('all', this)">All</button>
        <button class="filter-btn" onclick="filterPosts('bug', this)">Bugs</button>
        <button class="filter-btn" onclick="filterPosts('feature', this)">Feedback</button>
    </div>

    <!-- Feed -->
    <div id="feed-container" class="feed-container">
        <!-- Posts go here -->
    </div>

    <div id="loader" class="loader hidden"></div>
</div>

<div id="toast" class="toast hidden"></div>

<!-- Admin Login Modal -->
<div id="admin-modal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeAdminModal()"></div>
    <div class="modal-content admin-modal-content">
        <img src="../icon-512.png" class="modal-icon" alt="Admin Access">
        <h3 class="modal-title">Admin Access</h3>
        <p class="modal-text">Enter the master password to manage posts.</p>
        <input type="password" id="admin-password" class="modal-input center-input" placeholder="Password">
        <div class="modal-actions center-actions">
            <button class="modal-btn cancel" onclick="closeAdminModal()">Cancel</button>
            <button class="modal-btn primary" onclick="submitAdminLogin()">Login</button>
        </div>
    </div>
</div>

<!-- Confirmation Modal -->
<div id="confirmation-modal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeConfirmationModal()"></div>
    <div class="modal-content admin-modal-content">
        <h3 id="confirm-title" class="modal-title">Confirm</h3>
        <p id="confirm-text" class="modal-text">Are you sure?</p>
        <div class="modal-actions center-actions">
            <button class="modal-btn cancel" onclick="closeConfirmationModal()">Cancel</button>
            <button id="confirm-btn" class="modal-btn delete" onclick="executeConfirmAction()">Confirm</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
